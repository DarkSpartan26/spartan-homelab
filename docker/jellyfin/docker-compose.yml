services:
  jellyfin:
    image: jellyfin/jellyfin
    container_name: jellyfin
    user: "1000:1000"
    network_mode: 'host'
    volumes:
      - ./config:/config
      - ./cache:/cache
      - type: bind
        source: /mnt/sdc1
        target: /media
    restart: unless-stopped
    environment:
      - JELLYFIN_PublishedServerUrl=${SERVER_IP_OR_DOMAIN}
    extra_hosts:
      - 'host.docker.internal:host-gateway'
