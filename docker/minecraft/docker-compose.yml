services:
  mc:
    image: itzg/minecraft-server
    container_name: minecraft-server
    tty: true
    stdin_open: true
    ports:
      - "25565:25565"
    environment:
      EULA: "TRUE"
      VERSION: "1.21.9"
      TYPE: "PAPER"
      MEMORY: 6G
    volumes:
      - ./data:/data
    restart: unless-stopped
